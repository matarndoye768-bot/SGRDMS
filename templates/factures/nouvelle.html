{% extends "base.html" %}
{% block title %}Nouvelle Facture{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2><i class="fas fa-file-invoice-dollar me-2 text-primary"></i>Nouvelle Facture</h2>
        <p>Créer une facture pour un patient</p>
    </div>
    <a href="{{ url_for('factures_liste') }}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i> Retour
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-receipt me-2 text-primary"></i>Informations de la facture
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">

                        <div class="col-12">
                            <label class="form-label">Patient <span class="text-danger">*</span></label>
                            <select name="id_patient" class="form-select" required>
                                <option value="">-- Choisir un patient --</option>
                                {% for p in patients %}
                                <option value="{{ p.id_patient }}">
                                    {{ p.prenom }} {{ p.nom }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Montant total (FCFA) <span class="text-danger">*</span></label>
                            <input type="number" name="montant_total" class="form-control"
                                   placeholder="Ex: 15000" min="0" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Mode de paiement</label>
                            <select name="mode_paiement" class="form-select">
                                <option value="especes">💵 Espèces</option>
                                <option value="carte">💳 Carte bancaire</option>
                                <option value="assurance">🏥 Assurance</option>
                                <option value="mobile">📱 Mobile Money</option>
                            </select>
                        </div>

                        <div class="col-12 d-flex gap-2 justify-content-end mt-2">
                            <a href="{{ url_for('factures_liste') }}"
                               class="btn btn-outline-secondary">
                                <i class="fas fa-times me-1"></i> Annuler
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Créer la facture
                            </button>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
