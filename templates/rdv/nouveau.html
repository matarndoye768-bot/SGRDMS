{% extends "base.html" %}
{% block title %}Nouveau Rendez-vous{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2><i class="fas fa-calendar-plus me-2 text-primary"></i>Nouveau Rendez-vous</h2>
        <p>Planifier un rendez-vous pour un patient</p>
    </div>
    <a href="{{ url_for('rdv_liste') }}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i> Retour
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-calendar me-2 text-primary"></i>Informations du rendez-vous
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">

                        <!-- Patient -->
                        <div class="col-12">
                            <label class="form-label">Patient <span class="text-danger">*</span></label>
                            <select name="id_patient" class="form-select" required>
                                <option value="">-- Choisir un patient --</option>
                                {% for p in patients %}
                                <option value="{{ p.id_patient }}"
                                    {% if request.args.get('patient') == p.id_patient|string %}selected{% endif %}>
                                    {{ p.prenom }} {{ p.nom }} — {{ p.telephone or 'pas de tél.' }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Médecin -->
                        <div class="col-12">
                            <label class="form-label">Médecin <span class="text-danger">*</span></label>
                            <select name="id_medecin" class="form-select" required>
                                <option value="">-- Choisir un médecin --</option>
                                {% for m in medecins %}
                                <option value="{{ m.id_medecin }}">
                                    Dr. {{ m.prenom }} {{ m.nom }} — {{ m.specialite }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Date et heure -->
                        <div class="col-md-6">
                            <label class="form-label">Date & Heure <span class="text-danger">*</span></label>
                            <input type="datetime-local" name="date_heure"
                                   class="form-control" required>
                        </div>

                        <!-- Type -->
                        <div class="col-md-6">
                            <label class="form-label">Type de RDV</label>
                            <select name="type" class="form-select">
                                <option value="presentiel">🏥 Présentiel</option>
                                <option value="teleconsultation">📹 Téléconsultation</option>
                            </select>
                        </div>

                        <!-- Motif -->
                        <div class="col-12">
                            <label class="form-label">Motif</label>
                            <textarea name="motif" class="form-control" rows="2"
                                      placeholder="Motif de la consultation..."></textarea>
                        </div>

                        <!-- Boutons -->
                        <div class="col-12 d-flex gap-2 justify-content-end mt-2">
                            <a href="{{ url_for('rdv_liste') }}"
                               class="btn btn-outline-secondary">
                                <i class="fas fa-times me-1"></i> Annuler
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Créer le RDV
                            </button>
                        </div>

                    </div>
                </form>
            </div>
        </div>

        <div class="alert alert-warning mt-3">
            <i class="fas fa-exclamation-triangle me-2"></i>
            Un médecin ne peut pas avoir deux rendez-vous au même créneau horaire.
        </div>
    </div>
</div>
{% endblock %}
