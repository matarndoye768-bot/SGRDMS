{% extends "base.html" %}
{% block title %}Nouveau Médecin{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2><i class="fas fa-user-md me-2 text-primary"></i>Nouveau Médecin</h2>
        <p>Ajouter un nouveau médecin dans le système</p>
    </div>
    <a href="{{ url_for('medecins_liste') }}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i> Retour
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-id-badge me-2 text-primary"></i>Informations du médecin
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Prénom <span class="text-danger">*</span></label>
                            <input type="text" name="prenom" class="form-control"
                                   placeholder="Ex: Moussa" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Nom <span class="text-danger">*</span></label>
                            <input type="text" name="nom" class="form-control"
                                   placeholder="Ex: Sarr" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Spécialité <span class="text-danger">*</span></label>
                            <input type="text" name="specialite" class="form-control"
                                   placeholder="Ex: Pédiatre" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Service <span class="text-danger">*</span></label>
                            <select name="id_service" class="form-select" required>
                                <option value="">-- Choisir un service --</option>
                                {% for s in services %}
                                <option value="{{ s.id_service }}">{{ s.nom_service }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control"
                                   placeholder="Ex: medecin@tropical.sn">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Téléphone</label>
                            <input type="text" name="telephone" class="form-control"
                                   placeholder="Ex: 78 123 45 67">
                        </div>

                        <div class="col-12">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox"
                                       name="telecons_active" id="telecons">
                                <label class="form-check-label fw-600" for="telecons">
                                    <i class="fas fa-video me-1 text-success"></i>
                                    Activer la téléconsultation
                                </label>
                            </div>
                        </div>

                        <div class="col-12 d-flex gap-2 justify-content-end mt-2">
                            <a href="{{ url_for('medecins_liste') }}"
                               class="btn btn-outline-secondary">
                                <i class="fas fa-times me-1"></i> Annuler
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Enregistrer
                            </button>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>.fw-600 { font-weight: 600; }</style>
{% endblock %}
