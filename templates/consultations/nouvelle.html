{% extends "base.html" %}
{% block title %}Nouvelle Consultation{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2><i class="fas fa-stethoscope me-2 text-primary"></i>Nouvelle Consultation</h2>
        <p>Enregistrer une consultation médicale</p>
    </div>
    <a href="{{ url_for('consultations_liste') }}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i> Retour
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-notes-medical me-2 text-primary"></i>Informations de la consultation
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">

                        <!-- RDV -->
                        <div class="col-12">
                            <label class="form-label">Rendez-vous (terminé) <span class="text-danger">*</span></label>
                            <select name="id_rdv" class="form-select" required>
                                <option value="">-- Choisir un RDV --</option>
                                {% for r in rdvs %}
                                <option value="{{ r.id_rdv }}">
                                    #{{ r.id_rdv }} — {{ r.patient }} avec Dr. {{ r.medecin }}
                                    ({{ r.date_heure }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Motif -->
                        <div class="col-12">
                            <label class="form-label">Motif</label>
                            <input type="text" name="motif" class="form-control"
                                   placeholder="Motif de la consultation">
                        </div>

                        <!-- Diagnostic -->
                        <div class="col-12">
                            <label class="form-label">Diagnostic</label>
                            <textarea name="diagnostic" class="form-control" rows="2"
                                      placeholder="Diagnostic médical..."></textarea>
                        </div>

                        <!-- Constantes -->
                        <div class="col-12">
                            <div class="section-title">
                                <i class="fas fa-heartbeat text-danger me-2"></i>
                                <strong>Constantes vitales</strong>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Poids (kg)</label>
                            <input type="number" step="0.1" name="poids"
                                   class="form-control" placeholder="Ex: 70.5">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Température (°C)</label>
                            <input type="number" step="0.1" name="temperature"
                                   class="form-control" placeholder="Ex: 37.2">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Tension artérielle</label>
                            <input type="text" name="tension" class="form-control"
                                   placeholder="Ex: 120/80">
                        </div>

                        <!-- Notes -->
                        <div class="col-12">
                            <label class="form-label">Notes / Observations</label>
                            <textarea name="note" class="form-control" rows="3"
                                      placeholder="Notes complémentaires..."></textarea>
                        </div>

                        <!-- Boutons -->
                        <div class="col-12 d-flex gap-2 justify-content-end mt-2">
                            <a href="{{ url_for('consultations_liste') }}"
                               class="btn btn-outline-secondary">
                                <i class="fas fa-times me-1"></i> Annuler
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Enregistrer
                            </button>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.section-title {
    padding: 8px 0 4px;
    border-bottom: 2px solid #e2e8f0;
    margin-bottom: 5px;
    color: #374151;
}
</style>
{% endblock %}
