{% extends "base.html" %}
{% block title %}Ajouter à la liste d'attente{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2><i class="fas fa-list-ol me-2 text-primary"></i>Ajouter à la liste d'attente</h2>
        <p>Inscrire un patient dans la file d'attente</p>
    </div>
    <a href="{{ url_for('liste_attente') }}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i> Retour
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-user-plus me-2 text-primary"></i>Informations
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">

                        <div class="col-12">
                            <label class="form-label">Patient <span class="text-danger">*</span></label>
                            <select name="id_patient" class="form-select" required>
                                <option value="">-- Choisir un patient --</option>
                                {% for p in patients %}
                                <option value="{{ p.id_patient }}">
                                    {{ p.prenom }} {{ p.nom }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Niveau de priorité</label>
                            <div class="d-flex gap-3 mt-1">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           name="niveau_priorite" value="normal"
                                           id="normal" checked>
                                    <label class="form-check-label" for="normal">
                                        🟢 Normal
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           name="niveau_priorite" value="urgent" id="urgent">
                                    <label class="form-check-label" for="urgent">
                                        🟡 Urgent
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           name="niveau_priorite" value="critique" id="critique">
                                    <label class="form-check-label" for="critique">
                                        🔴 Critique
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 d-flex gap-2 justify-content-end mt-2">
                            <a href="{{ url_for('liste_attente') }}"
                               class="btn btn-outline-secondary">
                                <i class="fas fa-times me-1"></i> Annuler
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Ajouter
                            </button>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
