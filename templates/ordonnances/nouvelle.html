{% extends "base.html" %}
{% block title %}Nouvelle Ordonnance{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2><i class="fas fa-file-medical me-2 text-success"></i>Nouvelle Ordonnance</h2>
        <p>Consultation #{{ id_consultation }} — {{ patient }}</p>
    </div>
    <a href="{{ url_for('consultation_detail', id=id_consultation) }}"
       class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i> Retour
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-prescription me-2 text-success"></i>Rédiger l'ordonnance
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <input type="hidden" name="id_consultation" value="{{ id_consultation }}">

                    <!-- Instructions générales -->
                    <div class="mb-4">
                        <label class="form-label">Instructions générales</label>
                        <textarea name="instruction" class="form-control" rows="2"
                                  placeholder="Ex: Prendre avec de l'eau. Éviter le soleil..."></textarea>
                    </div>

                    <!-- MÉDICAMENTS -->
                    <div class="section-title mb-3">
                        <i class="fas fa-pills text-success me-2"></i>
                        <strong>Médicaments prescrits</strong>
                    </div>

                    <div id="lignes-container">
                        <!-- Ligne 1 par défaut -->
                        <div class="ligne-medicament card mb-3">
                            <div class="card-body p-3">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <strong class="text-primary">Médicament #1</strong>
                                </div>
                                <div class="row g-2">
                                    <div class="col-md-4">
                                        <label class="form-label">Médicament</label>
                                        <select name="id_medicament[]" class="form-select" required>
                                            <option value="">-- Choisir --</option>
                                            {% for med in medicaments %}
                                            <option value="{{ med.id_medicament }}">
                                                {{ med.nom }} ({{ med.dosage }})
                                            </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Quantité</label>
                                        <input type="number" name="quantite[]"
                                               class="form-control" placeholder="Ex: 10" min="1">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Fréquence</label>
                                        <input type="text" name="frequence[]"
                                               class="form-control" placeholder="Ex: 3 fois/jour">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Durée</label>
                                        <input type="text" name="duree_traitement[]"
                                               class="form-control" placeholder="Ex: 7 jours">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Voie d'administration</label>
                                        <select name="voie_administration[]" class="form-select">
                                            <option value="orale">Orale</option>
                                            <option value="injectable">Injectable</option>
                                            <option value="topique">Topique</option>
                                            <option value="inhalation">Inhalation</option>
                                            <option value="sublinguale">Sublinguale</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bouton ajouter médicament -->
                    <button type="button" class="btn btn-outline-success mb-4" id="addLigne">
                        <i class="fas fa-plus me-1"></i> Ajouter un médicament
                    </button>

                    <!-- Boutons -->
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ url_for('consultation_detail', id=id_consultation) }}"
                           class="btn btn-outline-secondary">
                            <i class="fas fa-times me-1"></i> Annuler
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-1"></i> Enregistrer l'ordonnance
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<style>
.section-title {
    padding: 8px 0 4px;
    border-bottom: 2px solid #e2e8f0;
    margin-bottom: 5px;
}
.ligne-medicament { border: 2px solid #e2e8f0; border-radius: 12px; }
</style>

<script>
let count = 1;
document.getElementById("addLigne").addEventListener("click", function() {
    count++;
    const container = document.getElementById("lignes-container");
    const medicamentsOptions = `{{ medicaments | tojson }}`;
    const meds = JSON.parse(medicamentsOptions);

    let options = '<option value="">-- Choisir --</option>';
    meds.forEach(m => {
        options += `<option value="${m.id_medicament}">${m.nom} (${m.dosage})</option>`;
    });

    const div = document.createElement("div");
    div.className = "ligne-medicament card mb-3";
    div.innerHTML = `
        <div class="card-body p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <strong class="text-primary">Médicament #${count}</strong>
                <button type="button" class="btn btn-sm btn-outline-danger remove-ligne">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
            <div class="row g-2">
                <div class="col-md-4">
                    <label class="form-label">Médicament</label>
                    <select name="id_medicament[]" class="form-select" required>
                        ${options}
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Quantité</label>
                    <input type="number" name="quantite[]" class="form-control" placeholder="Ex: 10" min="1">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Fréquence</label>
                    <input type="text" name="frequence[]" class="form-control" placeholder="Ex: 3 fois/jour">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Durée</label>
                    <input type="text" name="duree_traitement[]" class="form-control" placeholder="Ex: 7 jours">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Voie d'administration</label>
                    <select name="voie_administration[]" class="form-select">
                        <option value="orale">Orale</option>
                        <option value="injectable">Injectable</option>
                        <option value="topique">Topique</option>
                        <option value="inhalation">Inhalation</option>
                        <option value="sublinguale">Sublinguale</option>
                    </select>
                </div>
            </div>
        </div>`;
    container.appendChild(div);

    div.querySelector(".remove-ligne").addEventListener("click", function() {
        div.remove();
    });
});
</script>
{% endblock %}
